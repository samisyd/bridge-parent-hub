name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PORT: 3000 
  BASE_PATH: /bridge-parent-hub/
  VITE_BASE_PATH: /bridge-parent-hub/

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Find the Index File (Debug Step)
        run: |
          echo "=== SEARCHING FOR INDEX.HTML ==="
          find . -name "index.html" -not -path "*/node_modules/*"
          echo "=== SEARCHING FOR DIST FOLDERS ==="
          find . -type d -name "dist" -not -path "*/node_modules/*"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/bridge-hub/dist' # We will leave this for a second while we read the logs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
