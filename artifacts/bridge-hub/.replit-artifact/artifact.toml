kind = "web"
previewPath = "/"
title = "Bridge: Parent Support Hub"
version = "1.0.0"
id = "artifacts/bridge-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21736

[services.development]
run = "pnpm --filter @workspace/bridge-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bridge-hub", "run", "build" ]
publicDir = "artifacts/bridge-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21736"
BASE_PATH = "/"
